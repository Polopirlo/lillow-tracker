function getProfile(profiles,dateStr){const d=new Date(dateStr);for(let i=profiles.length-1;i>=0;i--){const p=profiles[i];if(new Date(p.dateFrom)<=d&&(!p.dateTo||new Date(p.dateTo)>=d))return p}return profiles[profiles.length-1]}

function estimateSplit(ca,orders,profile){
  if(!orders||orders===0||ca<=0)return{solo:0,cure:0,warning:false};
  const pS=profile.offers[0].price,pC=profile.offers[1].price;
  const cure=Math.round((ca-orders*pS)/(pC-pS));const solo=orders-cure;
  const warning=cure<0||solo<0||cure>orders;
  return{solo:Math.max(0,Math.min(orders,solo)),cure:Math.max(0,Math.min(orders,Math.max(0,cure))),warning};
}

function processHistorical(profiles){
  const totalCA=HISTORICAL_RAW.reduce((s,r)=>s+r.ca,0);
  return HISTORICAL_RAW.map(row=>{
    const profile=getProfile(profiles,row.date);
    const{solo,cure,warning}=estimateSplit(row.ca,row.orders,profile);
    const cogs=totalCA>0?Math.round((row.ca/totalCA)*HISTORICAL_TOTAL_COGS*100)/100:0;
    return{...row,solo,cure,cogs,profileId:profile.id,warning,isHistorical:true};
  });
}

function calcDay(e,profile,config){
  const ca=e.ca||0,ads=e.adspend||0,orders=e.orders||0,refund=e.refund||0;
  const solo=e.solo||0,cure=e.cure||0;
  const cogs=e.cogs!=null?e.cogs:(solo*profile.offers[0].cogs+cure*profile.offers[1].cogs);
  const aov=orders>0?ca/orders:0;const cac=orders>0?ads/orders:0;const roas=ads>0?ca/ads:0;
  const shopifyFees=ca*SHOPIFY_FEE_RATE;
  const margeDay=ca-ads-cogs-refund;const margeDayPct=ca>0?margeDay/ca:0;
  let charges=0,tva=0,is_amt=0,netProfit=0;
  if(config.taxRegime==="micro"){charges=ca*0.13;netProfit=ca-cogs-ads-refund-shopifyFees-charges;}
  else{tva=ca-(ca/1.20);const caHT=ca/1.20;charges=shopifyFees;const benef=caHT-cogs-ads-refund-shopifyFees;if(benef>0)is_amt=benef<=45000?benef*0.15:45000*0.15+(benef-45000)*0.25;netProfit=margeDay-tva-shopifyFees-is_amt;}
  const netProfitPct=ca>0?netProfit/ca:0;
  return{ca,ads,orders,refund,solo,cure,cogs,aov,cac,roas,shopifyFees,margeDay,margeDayPct,charges,tva,is_amt,netProfit,netProfitPct};
}

function EntryTab({entries,profiles,config,onSave}){
  const today=new Date().toISOString().slice(0,10);
  const[date,setDate]=useState(today);const[ca,setCa]=useState("");const[orders,setOrders]=useState("");
  const[adSpend,setAdSpend]=useState("");const[refund,setRefund]=useState("0");
  const[manSolo,setManSolo]=useState(null);const[manCure,setManCure]=useState(null);
  const[showMan,setShowMan]=useState(false);const[saved,setSaved]=useState(false);
  const existing=entries.find(e=>e.date===date);const profile=getProfile(profiles,date);
  useEffect(()=>{if(existing){setCa(String(existing.ca));setOrders(String(existing.orders));setAdSpend(String(existing.adspend));setRefund(String(existing.refund||0));if(existing.manualSplit){setManSolo(existing.solo);setManCure(existing.cure);setShowMan(true)}else{setManSolo(null);setManCure(null);setShowMan(false)}}else{setCa("");setOrders("");setAdSpend("");setRefund("0");setManSolo(null);setManCure(null);setShowMan(false)}setSaved(false)},[date,existing]);
  const nCa=parseFloat(ca)||0,nOrd=parseInt(orders)||0,nAds=parseFloat(adSpend)||0,nRef=parseFloat(refund)||0;
  const{solo:eSolo,cure:eCure,warning}=estimateSplit(nCa,nOrd,profile);
  const fSolo=manSolo!=null?manSolo:eSolo,fCure=manCure!=null?manCure:eCure;
  const cogs=fSolo*profile.offers[0].cogs+fCure*profile.offers[1].cogs;
  const entry={date,ca:nCa,orders:nOrd,adspend:nAds,refund:nRef,solo:fSolo,cure:fCure,cogs,profileId:profile.id,manualSplit:manSolo!=null};
  const m=nCa>0||nAds>0?calcDay(entry,profile,config):null;
  const doSave=()=>{if(nCa<=0&&nOrd<=0&&nAds<=0)return;onSave(entry);setSaved(true);setTimeout(()=>setSaved(false),2000)};

  return(<div style={{padding:"0 16px 100px"}}>
    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}>
      <span style={{fontSize:11,color:"#9ca3af"}}>PROFIL :</span>

    </div>
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div><label style={lStyle}>Date</label><input type="date" value={date} onChange={e=>setDate(e.target.value)} style={iStyle}/></div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <div><label style={lStyle}>CA total (€)</label><input type="number" step="0.01" value={ca} onChange={e=>setCa(e.target.value)} placeholder="0.00" style={iStyle}/></div>
        <div><label style={lStyle}>Nb commandes</label><input type="number" step="1" value={orders} onChange={e=>setOrders(e.target.value)} placeholder="0" style={iStyle}/></div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <div><label style={lStyle}>Ad Spend (€)</label><input type="number" step="0.01" value={adSpend} onChange={e=>setAdSpend(e.target.value)} placeholder="0.00" style={iStyle}/></div>
        <div><label style={lStyle}>Refunds (€)</label><input type="number" step="0.01" value={refund} onChange={e=>setRefund(e.target.value)} placeholder="0" style={iStyle}/></div>
      </div>
    </div>
    {nOrd>0&&(<div style={{marginTop:14,padding:12,borderRadius:14,background:warning?"rgba(245,158,11,0.1)":"rgba(192,132,252,0.08)",border:`1px solid ${warning?"rgba(245,158,11,0.3)":"rgba(192,132,252,0.15)"}`}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
        <span style={{fontSize:12,color:"#9ca3af"}}>{warning&&"⚠️ "}SPLIT ESTIMÉ</span>
        <button onClick={()=>setShowMan(!showMan)} style={{background:"rgba(192,132,252,0.15)",border:"none",color:"#c084fc",padding:"4px 10px",borderRadius:8,fontSize:11,cursor:"pointer",fontWeight:600}}>{showMan?"Auto":"Corriger"}</button>

        <div><span style={{color:"#9ca3af",fontSize:11}}>Solo</span>{showMan?<input type="number" value={manSolo??eSolo} onChange={e=>{setManSolo(parseInt(e.target.value)||0);setManCure(nOrd-(parseInt(e.target.value)||0))}} style={{...iStyle,padding:"6px 10px",width:60,fontSize:14}}/>:<div style={{fontSize:18,fontWeight:700,color:"#f0e6ff"}}>{fSolo}</div>}</div>

function KPIsTab({allEntries,profiles,config,cogsPayments}){
  const[period,setPeriod]=useState("all");const[cF,setCF]=useState("");const[cT,setCT]=useState("");
  const filtered=useMemo(()=>{const now=new Date();let from,to=now;switch(period){case"7d":from=new Date(now-7*864e5);break;case"30d":from=new Date(now-30*864e5);break;case"month":from=new Date(now.getFullYear(),now.getMonth(),1);break;case"all":from=new Date("2026-01-01");break;case"custom":from=cF?new Date(cF):new Date("2026-01-01");to=cT?new Date(cT):now;break;default:from=new Date("2026-01-01")}return allEntries.filter(e=>{const d=new Date(e.date);return d>=from&&d<=to})},[allEntries,period,cF,cT]);

  const totals=useMemo(()=>{
    const t={ca:0,ads:0,orders:0,refund:0,solo:0,cure:0,cogs:0,margeDay:0,netProfit:0,shopify:0,charges:0,tva:0,bestDay:null,bestCA:0,days:filtered.length};
    const dowS=Array(7).fill(null).map(()=>({ca:0,orders:0,count:0,ads:0}));
    filtered.forEach(e=>{const p=getProfile(profiles,e.date);const m=calcDay(e,p,config);t.ca+=m.ca;t.ads+=m.ads;t.orders+=m.orders;t.refund+=m.refund;t.solo+=m.solo;t.cure+=m.cure;t.cogs+=m.cogs;t.margeDay+=m.margeDay;t.netProfit+=m.netProfit;t.shopify+=m.shopifyFees;t.charges+=m.charges;t.tva+=m.tva;if(m.ca>t.bestCA){t.bestCA=m.ca;t.bestDay=e.date}const dow=new Date(e.date).getDay();dowS[dow].ca+=m.ca;dowS[dow].orders+=m.orders;dowS[dow].count++;dowS[dow].ads+=m.ads});
    t.aov=t.orders>0?t.ca/t.orders:0;t.cac=t.orders>0?t.ads/t.orders:0;t.roas=t.ads>0?t.ca/t.ads:0;
    // Real COGS: total payments prorated to this period's share of total CA
    const totalRealCOGS=cogsPayments.reduce((s,p)=>s+p.eur,0);
    const allCA=allEntries.reduce((s,e)=>s+(e.ca||0),0);
    t.cogsEstimated=t.cogs;t.cogsSource=totalRealCOGS>0?"réel":"estimé";
    if(totalRealCOGS>0&&allCA>0){
      // COGS ratio from real payments applied to this period's CA
      const realCogsRatio=totalRealCOGS/allCA;
      t.cogs=Math.round(t.ca*realCogsRatio*100)/100;
      t.margeDay=t.ca-t.ads-t.cogs-t.refund;
      if(config.taxRegime==="micro"){t.netProfit=t.ca-t.cogs-t.ads-t.refund-t.ca*0.03-t.ca*0.13}
      else{const tva2=t.ca-(t.ca/1.20);t.netProfit=t.margeDay-tva2-t.ca*0.03}
    }
    t.margeDayPct=t.ca>0?t.margeDay/t.ca:0;t.netProfitPct=t.ca>0?t.netProfit/t.ca:0;
    t.curePct=t.orders>0?t.cure/t.orders:0;t.cogsPerOrder=t.orders>0?t.cogs/t.orders:0;
    t.totalRealCOGS=totalRealCOGS;
    const cogsR=t.ca>0?t.cogs/t.ca:0.24;
    // ROAS BE Produit (just COGS + Shopify, no fiscal)
    t.roasBEproduit=1/(1-cogsR-SHOPIFY_FEE_RATE);
    if(config.taxRegime==="micro"){
      // Micro: Net = CA - Ads - COGS - Shopify(3%) - URSSAF(13%)
      t.roasBEnet=1/(1-cogsR-0.03-0.13);
      t.roasCible20=1/(1-cogsR-0.03-0.13-0.20);
      t.roasCible30=1/(1-cogsR-0.03-0.13-0.30);
    }else{
      // Société: CA_HT=CA/1.20, Net avant IS = CA_HT - Ads - COGS - Shopify(3%)
      t.roasBEnet=1/(1/1.20-cogsR-0.03);
      t.roasCible20=1/(1/1.20-cogsR-0.03-0.20);
      t.roasCible30=1/(1/1.20-cogsR-0.03-0.30);
    }
    let bestDow=0,bestDowCA=0;
    t.dowData=dowS.map((d,i)=>{const avg=d.count>0?d.ca/d.count:0;if(avg>bestDowCA){bestDowCA=avg;bestDow=i}return{name:DOW_FR[i],avgCA:avg,avgOrd:d.count>0?d.orders/d.count:0,roas:d.ads>0?d.ca/d.ads:0,count:d.count}});
    t.bestDow=DOW_FULL[bestDow];t.bestDowAvgCA=bestDowCA;
    return t;
  },[filtered,profiles,config,cogsPayments,allEntries]);

  return(<div style={{padding:"0 16px 100px"}}>
    <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:16}}>
      {["7d","30d","month","all","custom"].map(p=>(<button key={p} onClick={()=>setPeriod(p)} style={pillS(period===p)}>{p==="7d"?"7j":p==="30d"?"30j":p==="month"?"Mois":p==="all"?"Tout":"Custom"}</button>))}
    </div>
    {period==="custom"&&(<div style={{display:"flex",gap:8,marginBottom:14}}><input type="date" value={cF} onChange={e=>setCF(e.target.value)} style={{flex:1,padding:8,borderRadius:8,background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",color:"#f0e6ff",fontSize:13}}/><input type="date" value={cT} onChange={e=>setCT(e.target.value)} style={{flex:1,padding:8,borderRadius:8,background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",color:"#f0e6ff",fontSize:13}}/></div>)}
    <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
      <Card label="CA total" value={fmt(totals.ca)} icon="💰"/>
      <Card label="Marge Day" value={fmt(totals.margeDay)} sub={fmtPct(totals.margeDayPct)} color={totals.margeDay>=0?"#22c55e":"#ef4444"} icon="📈"/>
      <Card label="Net Profit" value={fmt(totals.netProfit)} sub={fmtPct(totals.netProfitPct)} color={totals.netProfit>=0?"#22c55e":"#ef4444"} icon="💎"/>
      <Card label="ROAS moyen" value={fmtN(totals.roas)} color={totals.roas>=totals.roasCible20?"#22c55e":totals.roas>=totals.roasBEnet?"#f59e0b":"#ef4444"} icon="🎯"/>
      <Card label="CAC moyen" value={fmt(totals.cac)} icon="💸"/>
      <Card label="AOV" value={fmt(totals.aov)} icon="🛒"/>
      <Card label="Commandes" value={fmtN(totals.orders)} icon="📦"/>
      <Card label="Ad Spend" value={fmt(totals.ads)} icon="📣"/>
      <Card label={`COGS ${totals.cogsSource}`} value={fmt(totals.cogs)} sub={`${fmt(totals.cogsPerOrder)}/cmd`} color={totals.cogsSource==="réel"?"#f59e0b":"#9ca3af"} icon={totals.cogsSource==="réel"?"💵":"📊"}/>
      <Card label="Shopify 3%" value={fmt(totals.shopify)} icon="🏪"/>
      <Card label="Refunds" value={fmt(totals.refund)} color="#ef4444" icon="↩️"/>
      <Card label="Mix Cure" value={fmtPct(totals.curePct)} sub={`${totals.cure}C / ${totals.solo}S`} icon="🧪"/>
      <Card label="BE Produit" value={fmtN(totals.roasBEproduit)} sub="COGS+Shopify" color="#9ca3af" icon="📦"/>
      <Card label="BE Net" value={fmtN(totals.roasBEnet)} sub={config.taxRegime==="micro"?"+13% URSSAF":"+20% TVA"} color="#ef4444" icon="🔴"/>
      <Card label="Cible 20%" value={fmtN(totals.roasCible20)} sub="20% net net" color="#f59e0b" icon="🟠"/>
      <Card label="Cible 30%" value={fmtN(totals.roasCible30)} sub="30% net net" color="#22c55e" icon="🟢"/>
      <Card label="Run days" value={totals.days+"j"} icon="📅"/>
      {totals.bestDay&&<Card label="Record" value={fmt(totals.bestCA)} sub={"🔥 "+shortD(totals.bestDay)} icon="🏆" color="#f59e0b"/>}
      <Card label="Best DOW" value={totals.bestDow} sub={`Moy ${fmt(totals.bestDowAvgCA)}`} icon="📆" color="#c084fc"/>
    </div>
    <div style={{marginTop:20}}>
      <div style={{fontSize:12,color:"#9ca3af",marginBottom:8,textTransform:"uppercase",letterSpacing:0.5}}>Performance par jour</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4}}>
        {totals.dowData.map((d,i)=>(<div key={i} style={{textAlign:"center",padding:"8px 2px",borderRadius:10,background:d.avgCA===totals.bestDowAvgCA?"rgba(192,132,252,0.15)":"rgba(255,255,255,0.03)",border:d.avgCA===totals.bestDowAvgCA?"1px solid rgba(192,132,252,0.3)":"1px solid transparent"}}>
          <div style={{fontSize:10,color:"#9ca3af",fontWeight:600}}>{d.name}</div>
          <div style={{fontSize:13,fontWeight:700,color:"#f0e6ff",fontFamily:"'Space Grotesk',sans-serif"}}>{Math.round(d.avgCA)}€</div>
          <div style={{fontSize:9,color:d.roas>=2.18?"#22c55e":d.roas>=1.5?"#f59e0b":"#ef4444"}}>R{d.roas.toFixed(1)}</div>
          <div style={{fontSize:9,color:"#6b7280"}}>{d.count}j</div>
        </div>))}
      </div>
    </div>
    <div style={{marginTop:12,fontSize:12,color:"#6b7280"}}>{filtered.length} jours</div>
  </div>);
}

// ─── STOCK TAB ──

  const prods=["serum","glove","card"].map(k=>{const s=stock[k];const v=vel[k];return{key:k,...s,velocity:v,daysLeft:s.status==="ordered"?null:v>0?s.qty/v:999}});
  const activate=k=>{setStock({...stock,[k]:{...stock[k],status:"instock"}});setStockHistory([...stockHistory,{date:new Date().toISOString(),product:k,type:"activate",qty:stock[k].qty,reason:"Stock reçu"}])};

      </div>
      <div style={{display:"flex",gap:16,marginBottom:8}}>

// ─── COGS PAYMENTS TAB ──
function COGSTab({cogsPayments,setCogsPayments,allEntries,profiles}){
  const[showAdd,setShowAdd]=useState(false);

  const[pAmountUSD,setPAmountUSD]=useState("");const[pAmountEUR,setPAmountEUR]=useState("");
  const[pNote,setPNote]=useState("");const[pRate,setPRate]=useState("0.92");

  const totalEUR=cogsPayments.reduce((s,p)=>s+p.eur,0);
  const totalUSD=cogsPayments.reduce((s,p)=>s+p.usd,0);

  // Estimated COGS from daily entries
  const estCOGS=useMemo(()=>allEntries.reduce((s,e)=>s+(e.cogs||0),0),[allEntries]);
  const delta=totalEUR-estCOGS;

  const addPayment=()=>{

    setCogsPayments(np);setPAmountUSD("");setPAmountEUR("");setPNote("");setShowAdd(false);
  };

      <Card label="COGS estimé" value={fmt(estCOGS)} sub="via split Solo/Cure" color="#9ca3af" icon="📊"/>

      💡 <span style={{color:"#c084fc",fontWeight:600}}>Le COGS réel</span> (virements) est utilisé dans les KPIs et la trésorerie. L'estimation quotidienne reste dans la saisie pour le suivi jour par jour.
    </div>

    {/* Add button */}
    <button onClick={()=>setShowAdd(true)} style={{width:"100%",padding:12,borderRadius:14,border:"none",background:"linear-gradient(135deg,#a855f7,#7c3aed)",color:"#fff",fontSize:15,fontWeight:700,cursor:"pointer",fontFamily:"'Space Grotesk',sans-serif",boxShadow:"0 4px 20px rgba(168,85,247,0.3)",marginBottom:16}}>+ Ajouter un virement COGS</button>

    {/* Payments list */}
    {cogsPayments.length>0&&(<div>
      <div style={{fontSize:12,color:"#9ca3af",marginBottom:8,textTransform:"uppercase",letterSpacing:0.5}}>Historique virements</div>
      {[...cogsPayments].reverse().map(p=>(<div key={p.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 12px",borderRadius:10,background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.06)",marginBottom:6}}>
        <div>
          <div style={{fontSize:13,fontWeight:600,color:"#f0e6ff",fontFamily:"'Space Grotesk',sans-serif"}}>{fmt(p.eur)} <span style={{color:"#6b7280",fontSize:11,fontWeight:400}}>(${p.usd})</span></div>
          <div style={{fontSize:11,color:"#6b7280"}}>{new Date(p.date).toLocaleDateString("fr-FR",{day:"2-digit",month:"short",year:"numeric"})} — {p.note}</div>
        </div>
        <button onClick={()=>delPayment(p.id)} style={{background:"none",border:"none",color:"#6b7280",cursor:"pointer",fontSize:16,padding:"4px 8px"}}>✕</button>
      </div>))}
    </div>)}

    {/* Add modal */}
    {showAdd&&(<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:"#1a1128",borderRadius:20,padding:24,width:"100%",maxWidth:360,border:"1px solid rgba(255,255,255,0.1)"}}>
        <div style={{fontSize:16,fontWeight:700,color:"#f0e6ff",marginBottom:16,fontFamily:"'Space Grotesk',sans-serif"}}>💵 Nouveau virement COGS</div>
        <div style={{marginBottom:10}}><label style={lStyle}>Date du virement</label><input type="date" value={pDate} onChange={e=>setPDate(e.target.value)} style={iStyle}/></div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
          <div><label style={lStyle}>Montant ($)</label><input type="number" step="0.01" value={pAmountUSD} onChange={e=>{setPAmountUSD(e.target.value);setPAmountEUR((parseFloat(e.target.value)*parseFloat(pRate)).toFixed(2))}} placeholder="1000" style={iStyle}/></div>
          <div><label style={lStyle}>Taux $/€</label><input type="number" step="0.01" value={pRate} onChange={e=>{setPRate(e.target.value);if(pAmountUSD)setPAmountEUR((parseFloat(pAmountUSD)*parseFloat(e.target.value)).toFixed(2))}} style={iStyle}/></div>
        </div>
        <div style={{marginBottom:10}}><label style={lStyle}>Montant (€) — auto-calculé</label><input type="number" step="0.01" value={pAmountEUR} onChange={e=>setPAmountEUR(e.target.value)} style={{...iStyle,color:"#f59e0b"}}/></div>
        <div style={{marginBottom:16}}><label style={lStyle}>Note</label><input value={pNote} onChange={e=>setPNote(e.target.value)} placeholder="Virement Bestfulfill via Wise" style={iStyle}/></div>

          <button onClick={()=>setShowAdd(false)} style={{flex:1,padding:10,borderRadius:10,border:"1px solid rgba(255,255,255,0.15)",background:"transparent",color:"#9ca3af",cursor:"pointer"}}>Annuler</button>
          <button onClick={addPayment} style={{flex:1,padding:10,borderRadius:10,border:"none",background:"linear-gradient(135deg,#a855f7,#7c3aed)",color:"#fff",cursor:"pointer",fontWeight:600}}>Ajouter</button>
        </div>
      </div>
    </div>)}
  </div>);
}

// ─── TREASURY TAB ──
function TreasuryTab({allEntries,profiles,config,subscriptions,setSubscriptions,cogsPayments}){
  const[showAdd,setShowAdd]=useState(false);const[sN,setSN]=useState("");const[sC,setSC]=useState("");
  const ye=allEntries.filter(e=>e.date>="2026-01-01");const cumCA=ye.reduce((s,e)=>s+(e.ca||0),0);const pPct=Math.min(100,(cumCA/90000)*100);
  const t=useMemo(()=>{const r={ca:0,ads:0,cogs:0,refund:0,shopify:0,charges:0,tva:0,is:0,netProfit:0};ye.forEach(e=>{const p=getProfile(profiles,e.date);const m=calcDay(e,p,config);r.ca+=m.ca;r.ads+=m.ads;r.cogs+=m.cogs;r.refund+=m.refund;r.shopify+=m.shopifyFees;r.charges+=m.charges;r.tva+=m.tva;r.is+=m.is_amt;r.netProfit+=m.netProfit});
    // Override with real COGS if payments exist (treasury = full year, no prorata needed)
    const realCOGS=cogsPayments.reduce((s,p)=>s+p.eur,0);
    if(realCOGS>0){r.cogs=realCOGS;r.margeDay=r.ca-r.ads-realCOGS-r.refund;
      if(config.taxRegime==="micro"){r.netProfit=r.ca-realCOGS-r.ads-r.refund-r.shopify-r.charges}
      else{r.netProfit=r.margeDay-r.tva-r.shopify-r.is}}
    return r},[ye,profiles,config,cogsPayments]);
  const mS=subscriptions.reduce((s,x)=>s+(x.cost||0),0);const mC=Math.max(1,new Set(ye.map(e=>e.date.slice(0,7))).size);const tS=mS*mC;
  const addSub=()=>{if(!sN||!sC)return;setSubscriptions([...subscriptions,{name:sN,cost:parseFloat(sC)}]);setSN("");setSC("");setShowAdd(false)};
  const bC=pPct>=83?"#ef4444":pPct>=60?"#f59e0b":"#a855f7";

  return(<div style={{padding:"0 16px 100px"}}>
    <div style={{background:"rgba(255,255,255,0.04)",borderRadius:16,padding:14,marginBottom:14,border:"1px solid rgba(255,255,255,0.08)"}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}><span style={{fontSize:12,color:"#9ca3af"}}>CA cumulé 2026</span><span style={{fontSize:12,fontWeight:700,color:bC,fontFamily:"'Space Grotesk',sans-serif"}}>{fmtPct(pPct/100)}</span></div>
      <div style={{width:"100%",height:10,background:"rgba(255,255,255,0.08)",borderRadius:6,overflow:"hidden"}}><div style={{width:`${pPct}%`,height:"100%",borderRadius:6,background:`linear-gradient(90deg,${bC},${bC}88)`,transition:"width 0.5s"}}/></div>
      <div style={{display:"flex",justifyContent:"space-between",marginTop:4,fontSize:12}}><span style={{color:"#f0e6ff",fontWeight:700,fontFamily:"'Space Grotesk',sans-serif"}}>{fmt(cumCA)}</span><span style={{color:"#6b7280"}}>/ 90 000€</span></div>
      {cumCA>=75000&&cumCA<90000&&<div style={{marginTop:6,padding:"4px 8px",background:"rgba(245,158,11,0.12)",borderRadius:8,fontSize:11,color:"#f59e0b"}}>⚠️ {fmt(90000-cumCA)} avant seuil</div>}
      <div style={{marginTop:6,fontSize:11,color:"#9ca3af"}}>Régime : <span style={{color:"#c084fc",fontWeight:600}}>{config.taxRegime==="micro"?"Micro (13%+3%)":"Société (TVA+IS+3%)"}</span></div>
    </div>
    <div style={{background:"rgba(255,255,255,0.04)",borderRadius:16,padding:14,marginBottom:14,border:"1px solid rgba(255,255,255,0.08)"}}>
      <div style={{fontSize:12,color:"#9ca3af",marginBottom:10,textTransform:"uppercase",letterSpacing:0.5}}>Trésorerie 2026</div>
      {[{l:"💰 CA brut",v:t.ca,c:"#22c55e"},{l:"📣 Ad Spend",v:-t.ads,c:"#ef4444"},{l:"🏭 COGS",v:-t.cogs,c:"#ef4444"},{l:"↩️ Refunds",v:-t.refund,c:"#ef4444"},{l:"🏪 Shopify 3%",v:-t.shopify,c:"#f59e0b"},{l:"🏛️ Charges 13%",v:-t.charges,c:"#ef4444"},...(config.taxRegime!=="micro"?[{l:"💶 TVA 20%",v:-t.tva,c:"#ef4444"}]:[]),{l:"📋 Abonnements",v:-tS,c:"#f59e0b"}].map((r,i)=>(<div key={i} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:"1px solid rgba(255,255,255,0.04)",fontSize:13}}><span style={{color:"#9ca3af"}}>{r.l}</span><span style={{color:r.c,fontWeight:600,fontFamily:"'Space Grotesk',sans-serif"}}>{fmt(r.v)}</span></div>))}
      <div style={{display:"flex",justifyContent:"space-between",padding:"10px 0 2px",fontSize:15,fontWeight:700}}><span style={{color:"#f0e6ff"}}>💎 Net dispo</span><span style={{color:(t.netProfit-tS)>=0?"#22c55e":"#ef4444",fontFamily:"'Space Grotesk',sans-serif"}}>{fmt(t.netProfit-tS)}</span></div>
    </div>
    <div style={{background:"rgba(245,158,11,0.06)",borderRadius:16,padding:14,marginBottom:14,border:"1px solid rgba(245,158,11,0.15)"}}>
      <div style={{fontSize:12,color:"#f59e0b",marginBottom:8,textTransform:"uppercase",letterSpacing:0.5}}>Provisions</div>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:13}}><span style={{color:"#9ca3af"}}>Charges (13%)</span><span style={{color:"#f59e0b",fontWeight:700}}>{fmt(t.ca*0.13)}</span></div>
    </div>
    <div style={{background:"rgba(255,255,255,0.04)",borderRadius:16,padding:14,border:"1px solid rgba(255,255,255,0.08)"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}><span style={{fontSize:12,color:"#9ca3af",textTransform:"uppercase",letterSpacing:0.5}}>Abonnements</span><button onClick={()=>setShowAdd(true)} style={{background:"rgba(192,132,252,0.15)",border:"none",color:"#c084fc",padding:"4px 12px",borderRadius:8,fontSize:11,cursor:"pointer",fontWeight:600}}>+ Ajouter</button></div>
      {subscriptions.map((s,i)=>(<div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:"1px solid rgba(255,255,255,0.04)"}}><span style={{color:"#d1d5db",fontSize:13}}>{s.name}</span><div style={{display:"flex",alignItems:"center",gap:6}}><span style={{color:"#f0e6ff",fontWeight:600,fontSize:13,fontFamily:"'Space Grotesk',sans-serif"}}>{fmt(s.cost)}/m</span><button onClick={()=>setSubscriptions(subscriptions.filter((_,j)=>j!==i))} style={{background:"none",border:"none",color:"#6b7280",cursor:"pointer",fontSize:14}}>✕</button></div></div>))}
      {!subscriptions.length&&<div style={{color:"#6b7280",fontSize:12,padding:6}}>Aucun</div>}
      <div style={{display:"flex",justifyContent:"space-between",marginTop:6,fontSize:13,fontWeight:700}}><span style={{color:"#9ca3af"}}>Total/mois</span><span style={{color:"#f0e6ff",fontFamily:"'Space Grotesk',sans-serif"}}>{fmt(mS)}</span></div>
    </div>
    {showAdd&&(<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}><div style={{background:"#1a1128",borderRadius:20,padding:24,width:"100%",maxWidth:340,border:"1px solid rgba(255,255,255,0.1)"}}>
      <div style={{fontSize:16,fontWeight:700,color:"#f0e6ff",marginBottom:16}}>Nouvel abonnement</div>
      <input value={sN} onChange={e=>setSN(e.target.value)} placeholder="Nom" style={{...iStyle,marginBottom:10}}/>
      <input type="number" value={sC} onChange={e=>setSC(e.target.value)} placeholder="€/mois" style={{...iStyle,marginBottom:16}}/>
      <div style={{display:"flex",gap:8}}><button onClick={()=>setShowAdd(false)} style={{flex:1,padding:10,borderRadius:10,border:"1px solid rgba(255,255,255,0.15)",background:"transparent",color:"#9ca3af",cursor:"pointer"}}>Annuler</button><button onClick={addSub} style={{flex:1,padding:10,borderRadius:10,border:"none",background:"linear-gradient(135deg,#a855f7,#7c3aed)",color:"#fff",cursor:"pointer",fontWeight:600}}>OK</button></div>
    </div></div>)}
  </div>);
}

// ─── CHARTS TAB ──
function ChartsTab({allEntries,profiles,config}){
  const[view,setView]=useState("ca");
  const cd=useMemo(()=>allEntries.slice(-30).map(e=>{const p=getProfile(profiles,e.date);const m=calcDay(e,p,config);return{date:shortD(e.date),ca:m.ca,ads:m.ads,netProfit:m.netProfit,margeDay:m.margeDay,roas:m.roas,orders:m.orders,solo:m.solo,cure:m.cure,aov:m.aov,cac:m.cac}}),[allEntries,profiles,config]);
  const piS=cd.reduce((s,d)=>s+d.solo,0),piC=cd.reduce((s,d)=>s+d.cure,0);
  const tt={background:"#1a1128",border:"1px solid rgba(255,255,255,0.1)",borderRadius:10,color:"#f0e6ff",fontSize:11};
  // Dynamic ROAS thresholds
  const totalCA=allEntries.reduce((s,e)=>s+(e.ca||0),0);const totalCOGS=allEntries.reduce((s,e)=>s+(e.cogs||0),0);
  const cogsR=totalCA>0?totalCOGS/totalCA:0.24;
  const rBEnet=config.taxRegime==="micro"?1/(1-cogsR-0.03-0.13):1/(1/1.20-cogsR-0.03);
  const rC20=config.taxRegime==="micro"?1/(1-cogsR-0.03-0.13-0.20):1/(1/1.20-cogsR-0.03-0.20);

  return(<div style={{padding:"0 16px 100px"}}>
    <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:14}}>
      {[{id:"ca",l:"CA"},{id:"margin",l:"Marges"},{id:"roas",l:"ROAS"},{id:"mix",l:"Mix"},{id:"aov",l:"AOV/CAC"}].map(v=>(<button key={v.id} onClick={()=>setView(v.id)} style={pillS(view===v.id)}>{v.l}</button>))}
    </div>
    <div style={{width:"100%",height:280}}>
      {view==="ca"&&<ResponsiveContainer><ComposedChart data={cd}><CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.06)"/><XAxis dataKey="date" tick={{fill:"#6b7280",fontSize:9}}/><YAxis tick={{fill:"#6b7280",fontSize:9}}/><Tooltip contentStyle={tt}/><Bar dataKey="ca" fill="#a855f7" radius={[4,4,0,0]} name="CA"/><Line dataKey="ads" stroke="#ef4444" strokeWidth={2} dot={false} name="Ad Spend"/></ComposedChart></ResponsiveContainer>}
      {view==="margin"&&<ResponsiveContainer><ComposedChart data={cd}><CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.06)"/><XAxis dataKey="date" tick={{fill:"#6b7280",fontSize:9}}/><YAxis tick={{fill:"#6b7280",fontSize:9}}/><Tooltip contentStyle={tt}/><Area dataKey="margeDay" fill="#22c55e22" stroke="#22c55e" name="Marge Day"/><Line dataKey="netProfit" stroke="#c084fc" strokeWidth={2} dot={false} name="Net Profit"/><ReferenceLine y={0} stroke="#ef4444" strokeDasharray="4 4"/></ComposedChart></ResponsiveContainer>}
      {view==="roas"&&<ResponsiveContainer><ComposedChart data={cd}><CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.06)"/><XAxis dataKey="date" tick={{fill:"#6b7280",fontSize:9}}/><YAxis tick={{fill:"#6b7280",fontSize:9}}/><Tooltip contentStyle={tt}/><Line dataKey="roas" stroke="#a855f7" strokeWidth={2} name="ROAS"/><ReferenceLine y={parseFloat(rBEnet.toFixed(2))} stroke="#ef4444" strokeDasharray="4 4" label={{value:"BE Net",fill:"#ef4444",fontSize:9}}/><ReferenceLine y={parseFloat(rC20.toFixed(2))} stroke="#22c55e" strokeDasharray="4 4" label={{value:"20%",fill:"#22c55e",fontSize:9}}/></ComposedChart></ResponsiveContainer>}
      {view==="mix"&&<ResponsiveContainer><PieChart><Pie data={[{name:"Solo",value:piS},{name:"Cure",value:piC}]} cx="50%" cy="50%" innerRadius={60} outerRadius={100} paddingAngle={4} dataKey="value" label={({name,percent})=>`${name} ${(percent*100).toFixed(0)}%`}><Cell fill="#a855f7"/><Cell fill="#f59e0b"/></Pie><Tooltip contentStyle={tt}/></PieChart></ResponsiveContainer>}
      {view==="aov"&&<ResponsiveContainer><ComposedChart data={cd}><CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.06)"/><XAxis dataKey="date" tick={{fill:"#6b7280",fontSize:9}}/><YAxis tick={{fill:"#6b7280",fontSize:9}}/><Tooltip contentStyle={tt}/><Line dataKey="aov" stroke="#f59e0b" strokeWidth={2} name="AOV"/><Line dataKey="cac" stroke="#ef4444" strokeWidth={2} dot={false} name="CAC"/></ComposedChart></ResponsiveContainer>}
    </div>
  </div>);
}

// ─── SETTINGS ──
function Settings({config,setConfig,profiles,onClose}){
  return(<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",zIndex:300,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
    <div style={{background:"#1a1128",borderRadius:"20px 20px 0 0",padding:24,width:"100%",maxWidth:420,maxHeight:"70vh",overflowY:"auto",border:"1px solid rgba(255,255,255,0.1)"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}><span style={{fontSize:18,fontWeight:700,color:"#f0e6ff",fontFamily:"'Space Grotesk',sans-serif"}}>⚙️ Paramètres</span><button onClick={onClose} style={{background:"none",border:"none",color:"#9ca3af",fontSize:20,cursor:"pointer"}}>✕</button></div>
      <div style={{marginBottom:16}}><label style={{...lStyle,marginBottom:6}}>Régime fiscal</label><div style={{display:"flex",gap:8}}>
        {["micro","societe"].map(r=>(<button key={r} onClick={()=>setConfig({...config,taxRegime:r})} style={{flex:1,padding:10,borderRadius:10,border:"none",fontSize:13,fontWeight:600,cursor:"pointer",background:config.taxRegime===r?"rgba(192,132,252,0.2)":"rgba(255,255,255,0.05)",color:config.taxRegime===r?"#c084fc":"#6b7280"}}>{r==="micro"?"Micro (13%+3%)":"Société (TVA+IS+3%)"}</button>))}
      </div></div>
      <div style={{marginBottom:16}}><label style={lStyle}>Profils de prix</label>
        {profiles.map(p=>(<div key={p.id} style={{padding:8,borderRadius:10,background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.06)",marginBottom:4}}><div style={{fontWeight:600,color:"#f0e6ff",fontSize:12}}>{p.name}</div>{p.offers.map((o,i)=><div key={i} style={{fontSize:11,color:"#9ca3af"}}>{o.name}: {fmt(o.price)} — COGS {fmt(o.cogs)}</div>)}</div>))}
      </div>
      <button onClick={async()=>{if(confirm("Supprimer toutes les données?")){for(const k of Object.values(KEYS)){try{await window.storage.delete(k)}catch{}}window.location.reload()}}} style={{width:"100%",padding:12,borderRadius:12,border:"1px solid rgba(239,68,68,0.3)",background:"rgba(239,68,68,0.1)",color:"#ef4444",cursor:"pointer",fontSize:14,fontWeight:600}}>🗑️ Réinitialiser</button>
    </div>
  </div>);
}

// ─── MAIN ──
function LillowTracker(){
  const[loading,setLoading]=useState(true);const[tab,setTab]=useState("entry");const[showS,setShowS]=useState(false);
  const[config,setConfig]=useState({taxRegime:"micro"});const[profiles,setProfiles]=useState(DEFAULT_PROFILES);
  const[entries,setEntries]=useState([]);const[stock,setStock]=useState(DEFAULT_STOCK);const[stockH,setStockH]=useState([]);const[subs,setSubs]=useState([]);const[cogsPay,setCogsPay]=useState([]);

  useEffect(()=>{(async()=>{try{const init=await sGet(KEYS.initialized);if(init){const[c,p,e,s,sh,su,cp]=await Promise.all([sGet(KEYS.config),sGet(KEYS.profiles),sGet(KEYS.entries),sGet(KEYS.stock),sGet(KEYS.stockHistory),sGet(KEYS.subscriptions),sGet(KEYS.cogsPayments)]);if(c)setConfig(c);if(p)setProfiles(p);if(e)setEntries(e);if(s)setStock(s);if(sh)setStockH(sh);if(su)setSubs(su);if(cp)setCogsPay(cp)}else{const hist=processHistorical(DEFAULT_PROFILES);setEntries(hist);const initCogs=[{id:1,date:"2026-03-10",usd:9288,eur:8544,rate:0.92,note:"COGS cumulé historique (25 jan - 10 mars)"}];setCogsPay(initCogs);await Promise.all([sSet(KEYS.entries,hist),sSet(KEYS.config,config),sSet(KEYS.profiles,DEFAULT_PROFILES),sSet(KEYS.stock,DEFAULT_STOCK),sSet(KEYS.stockHistory,[]),sSet(KEYS.subscriptions,[]),sSet(KEYS.cogsPayments,initCogs),sSet(KEYS.initialized,true)])}}catch{setEntries(processHistorical(DEFAULT_PROFILES))}setLoading(false)})()},[]);

  useEffect(()=>{const cum=entries.filter(e=>e.date>="2026-01-01").reduce((s,e)=>s+(e.ca||0),0);if(cum>=90000&&config.taxRegime==="micro")setConfig(p=>({...p,taxRegime:"societe"}))},[entries]);

  const saveCfg=useCallback(async c=>{setConfig(c);await sSet(KEYS.config,c)},[]);
  const saveStk=useCallback(async s=>{setStock(s);await sSet(KEYS.stock,s)},[]);
  const saveSH=useCallback(async h=>{setStockH(h);await sSet(KEYS.stockHistory,h)},[]);
  const saveSub=useCallback(async s=>{setSubs(s);await sSet(KEYS.subscriptions,s)},[]);
  const saveCogsPay=useCallback(async c=>{setCogsPay(c);await sSet(KEYS.cogsPayments,c)},[]);

  const handleSave=useCallback(async entry=>{
    const ne=[...entries.filter(e=>e.date!==entry.date),entry].sort((a,b)=>a.date.localeCompare(b.date));
    setEntries(ne);await sSet(KEYS.entries,ne);
    const prof=getProfile(profiles,entry.date);const ns={...stock};const nh=[...stockH];
    const ded={serum:entry.solo*(prof.offers[0].serums||1)+entry.cure*(prof.offers[1].serums||3),glove:entry.cure*(prof.offers[1].gloves||0),card:entry.solo*(prof.offers[0].cards||0)+entry.cure*(prof.offers[1].cards||0)};
    Object.keys(ded).forEach(k=>{if(ded[k]>0&&ns[k].status==="instock"){ns[k]={...ns[k],qty:Math.max(0,ns[k].qty-ded[k])};nh.push({date:new Date().toISOString(),product:k,type:"auto",qty:-ded[k],reason:`Vente ${entry.date}`})}});
    saveStk(ns);saveSH(nh);
  },[entries,stock,stockH,profiles,saveStk,saveSH]);

  const allE=useMemo(()=>[...entries].sort((a,b)=>a.date.localeCompare(b.date)),[entries]);
  const qs=useMemo(()=>{const ytd=allE.filter(e=>e.date>="2026-01-01");const cum=ytd.reduce((s,e)=>s+(e.ca||0),0);const l7=allE.slice(-7);const r7c=l7.reduce((s,e)=>s+(e.ca||0),0);const r7a=l7.reduce((s,e)=>s+(e.adspend||0),0);return{cum,roas7:r7a>0?r7c/r7a:0,days:ytd.length}},[allE]);

  if(loading)return(<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"linear-gradient(180deg,#110c1d,#1a1128)",color:"#c084fc",fontFamily:"'Space Grotesk',sans-serif",fontSize:20}}><div style={{textAlign:"center"}}><div style={{fontSize:40,marginBottom:12}}>🌸</div>Chargement...</div></div>);

  return(<div style={{minHeight:"100vh",background:"linear-gradient(180deg,#110c1d,#0d0a16)",color:"#f0e6ff",fontFamily:"'DM Sans',sans-serif"}}>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <div style={{padding:"14px 16px 10px",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:"1px solid rgba(255,255,255,0.06)"}}>
      <div style={{fontSize:22,fontWeight:700,fontFamily:"'Space Grotesk',sans-serif"}}><span style={{color:"#c084fc"}}>LILLOW</span><span style={{color:"#6b7280",fontSize:13,fontWeight:400,marginLeft:8}}>Tracker</span></div>
      <button onClick={()=>setShowS(true)} style={{background:"rgba(255,255,255,0.06)",border:"none",borderRadius:10,padding:"8px 12px",color:"#9ca3af",cursor:"pointer",fontSize:16}}>⚙️</button>
    </div>
    <div style={{display:"flex",gap:12,padding:"8px 16px",overflowX:"auto",borderBottom:"1px solid rgba(255,255,255,0.04)",fontSize:11,color:"#6b7280"}}>
      <span>CA YTD <b style={{color:"#f0e6ff",fontFamily:"'Space Grotesk',sans-serif"}}>{(qs.cum/1000).toFixed(1)}K</b></span>
      <span>ROAS 7j <b style={{color:qs.roas7>=2?"#22c55e":"#f59e0b",fontFamily:"'Space Grotesk',sans-serif"}}>{qs.roas7.toFixed(2)}</b></span>
      <span>Run <b style={{color:"#c084fc"}}>{qs.days}j</b></span>
      <span>Régime <b style={{color:"#c084fc"}}>{config.taxRegime==="micro"?"Micro":"SASU"}</b></span>
    </div>
    <div style={{paddingTop:14}}>
      {tab==="entry"&&<EntryTab entries={entries} profiles={profiles} config={config} onSave={handleSave}/>}
      {tab==="kpis"&&<KPIsTab allEntries={allE} profiles={profiles} config={config} cogsPayments={cogsPay}/>}
      {tab==="cogs"&&<COGSTab cogsPayments={cogsPay} setCogsPayments={saveCogsPay} allEntries={allE} profiles={profiles}/>}
      {tab==="stock"&&<StockTab stock={stock} setStock={saveStk} stockHistory={stockH} setStockHistory={saveSH} allEntries={allE}/>}
      {tab==="treasury"&&<TreasuryTab allEntries={allE} profiles={profiles} config={config} subscriptions={subs} setSubscriptions={saveSub} cogsPayments={cogsPay}/>}
      {tab==="charts"&&<ChartsTab allEntries={allE} profiles={profiles} config={config}/>}
    </div>
    <TabBar active={tab} onChange={setTab}/>
    {showS&&<Settings config={config} setConfig={saveCfg} profiles={profiles} onClose={()=>setShowS(false)}/>}
  </div>);
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(LillowTracker));
  </script>
</body>
</html>
